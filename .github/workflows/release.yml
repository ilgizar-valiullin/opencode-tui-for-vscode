name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - run: npx vsce package -o opencode-tui-for-vscode.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: opencode-tui-for-vscode.vsix

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: vsix
          path: .

      - name: Generate release notes
        run: |
          VERSION="${{ github.ref_name }}"
          PREV=$(git tag --sort=-v:refname | sed -n '2p')
          [ -z "$PREV" ] && PREV="v1.0.0"
          LOG=$(git log --oneline --no-decorate "$PREV..HEAD" | sed 's/^/- /')
          cat > release-notes.md <<EOF
          ## Downloads

          [opencode-tui-for-vscode.vsix](https://github.com/${{ github.repository }}/releases/download/$VERSION/opencode-tui-for-vscode.vsix) — universal VSIX for Windows, macOS (Intel + Apple Silicon), Linux

          ## What's Changed

          $LOG

          ## Full Changelog

          https://github.com/${{ github.repository }}/compare/$PREV...$VERSION
          EOF

      - name: Publish release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md \
            opencode-tui-for-vscode.vsix
        env:
          GH_TOKEN: ${{ github.token }}
