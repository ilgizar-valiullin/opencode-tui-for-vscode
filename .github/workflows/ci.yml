name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Package VSIX
        run: npx vsce package --no-dependencies -o opencode-tui-for-vscode-ci.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.os }}
          path: opencode-tui-for-vscode-ci.vsix
